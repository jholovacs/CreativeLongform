services:
  postgres:
    image: postgres:16-alpine
    container_name: creative-longform-pg
    environment:
      POSTGRES_USER: creative
      POSTGRES_PASSWORD: creative
      POSTGRES_DB: creativelongform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creative -d creativelongform"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: creative-longform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: creative-longform-api
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DisableHttpsRedirection: "true"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=creativelongform;Username=creative;Password=creative"
      Ollama__BaseUrl: "http://ollama:11434/api"
      Ollama__WriterModel: "${OLLAMA_MODEL:-llama3.2}"
      Ollama__CriticModel: "${OLLAMA_MODEL:-llama3.2}"
    ports:
      - "5094:8080"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/127.0.0.1/8080"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  web:
    build:
      context: web
      dockerfile: Dockerfile
    container_name: creative-longform-web
    # Use service_started (not service_healthy): otherwise `docker compose up` can block until the API passes its
    # healthcheck. A slow first migration, a flaky TCP check, or bash missing in the image would prevent `web` from
    # ever starting and make `make deploy` look hung. Nginx may briefly return 502 until the API is listening.
    depends_on:
      api:
        condition: service_started
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
