services:
  postgres:
    image: postgres:16-alpine
    container_name: creative-longform-pg
    environment:
      POSTGRES_USER: creative
      POSTGRES_PASSWORD: creative
      POSTGRES_DB: creativelongform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U creative -d creativelongform"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: creative-longform-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: creative-longform-api
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DisableHttpsRedirection: "true"
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=creativelongform;Username=creative;Password=creative"
      Ollama__BaseUrl: "http://ollama:11434/api"
    ports:
      - "5094:8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    container_name: creative-longform-web
    depends_on:
      - api
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  pgdata:
  ollama:
