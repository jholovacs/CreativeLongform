@if (visible) {
  <div class="clf-llm-banner" role="status" aria-live="polite" aria-busy="true">
    <div class="clf-llm-banner__row">
      <span class="clf-llm-spinner-ring" aria-hidden="true"></span>
      <span class="clf-llm-banner__text">{{ label }}</span>

}
