# Ensures API and web Dockerfiles still build on every PR / main push (no registry push).

name: Docker build (verify)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: docker-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: web
          file: web/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
